---
# Corrected nginx config for devapp-web.
# Fixes keycloak namespace targeting and adds
# resolver-based dynamic DNS so nginx survives upstream being temporarily
# unavailable at startup (e.g. after node reboot).
apiVersion: v1
kind: ConfigMap
metadata:
  name: devapp-web-nginx
  namespace: devapp
data:
  default.conf: |
    resolver kube-dns.kube-system.svc.cluster.local valid=30s;

    server {
        listen 80;
        server_name localhost;

        root /usr/share/nginx/html;
        index index.html;

        # Gzip compression
        gzip on;
        gzip_min_length 1000;
        gzip_proxied expired no-cache no-store private auth;
        gzip_types text/plain text/css application/json application/javascript application/x-javascript text/xml application/xml application/xml+rss text/javascript;

        # Angular App
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Proxy to User Service
        location /api/users {
            proxy_pass http://user-app:8080/api/users;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header Authorization $http_authorization;
            proxy_pass_header Authorization;
            proxy_cache_bypass $http_upgrade;
        }

        # Proxy to Order Service
        location /api/orders {
            proxy_pass http://order-app:8081/api/orders;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header Authorization $http_authorization;
            proxy_pass_header Authorization;
            proxy_cache_bypass $http_upgrade;
        }

        # Proxy to Keycloak — uses variable so nginx resolves DNS at
        # request time instead of at startup (prevents crash when
        # keycloak is not yet ready after a reboot).
        location /auth/ {
            set $keycloak_upstream keycloak.infra.svc.cluster.local;
            rewrite ^/auth/(.*) /$1 break;
            proxy_pass http://$keycloak_upstream:8080;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }

        # Error pages
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }

---
apiVersion: v1
kind: Service
metadata:
  name: keycloak
  namespace: devapp
spec:
  type: ExternalName
  externalName: keycloak.infra.svc.cluster.local
  ports:
    - port: 8080

---
apiVersion: v1
kind: Service
metadata:
  name: devapp-web
  namespace: devapp
spec:
  selector:
    app: devapp-web
  ports:
    - port: 80
      targetPort: 80

---
apiVersion: v1
kind: Service
metadata:
  name: user-app
  namespace: devapp
spec:
  selector:
    app: user-app
  ports:
    - port: 8080
      targetPort: 8080

---
apiVersion: v1
kind: Service
metadata:
  name: order-app
  namespace: devapp
spec:
  selector:
    app: order-app
  ports:
    - port: 8081
      targetPort: 8081

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: devapp-web
  namespace: devapp
  labels:
    app: devapp-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: devapp-web
  template:
    metadata:
      labels:
        app: devapp-web
    spec:
      containers:
        - name: devapp-web
          image: devapp/devapp-web:v3
          imagePullPolicy: Never
          ports:
            - containerPort: 80
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 5
      volumes:
        - name: nginx-config
          configMap:
            name: devapp-web-nginx

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-app
  namespace: devapp
  labels:
    app: user-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-app
  template:
    metadata:
      labels:
        app: user-app
    spec:
      containers:
        - name: user-app
          image: devapp/user-app:v5
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: prod
            - name: DB_HOST
              value: postgres.infra.svc.cluster.local
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: devappdb
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: devapp-db-credentials
                  key: DB_USERNAME
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: devapp-db-credentials
                  key: DB_PASSWORD
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: kafka.infra.svc.cluster.local:9092
            - name: KAFKA_CONSUMER_GROUP
              value: user-service-group
            - name: REDIS_HOST
              value: redis.infra.svc.cluster.local
            - name: REDIS_PORT
              value: "6379"
            - name: SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI
              value: https://devapp.swirlit.dev/auth/realms/devapp
            - name: SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI
              value: https://devapp.swirlit.dev/auth/realms/devapp/protocol/openid-connect/certs
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 30

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-app
  namespace: devapp
  labels:
    app: order-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-app
  template:
    metadata:
      labels:
        app: order-app
    spec:
      containers:
        - name: order-app
          image: devapp/order-app:v5
          imagePullPolicy: Never
          ports:
            - containerPort: 8081
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: prod
            - name: DB_HOST
              value: postgres.infra.svc.cluster.local
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: devappdb
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: devapp-db-credentials
                  key: DB_USERNAME
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: devapp-db-credentials
                  key: DB_PASSWORD
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: kafka.infra.svc.cluster.local:9092
            - name: REDIS_HOST
              value: redis.infra.svc.cluster.local
            - name: REDIS_PORT
              value: "6379"
            - name: SPRING_DATA_REDIS_HOST
              value: redis.infra.svc.cluster.local
            - name: SPRING_DATA_REDIS_PORT
              value: "6379"
            - name: SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI
              value: https://devapp.swirlit.dev/auth/realms/devapp
            - name: SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI
              value: https://devapp.swirlit.dev/auth/realms/devapp/protocol/openid-connect/certs
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 60
            periodSeconds: 30

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: devapp-ingress
  namespace: devapp
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - devapp.swirlit.dev
      secretName: swirlit-dev-tls
  rules:
    - host: devapp.swirlit.dev
      http:
        paths:
          - path: /auth
            pathType: Prefix
            backend:
              service:
                name: keycloak
                port:
                  number: 8080
          - path: /api/users
            pathType: Prefix
            backend:
              service:
                name: user-app
                port:
                  number: 8080
          - path: /api/orders
            pathType: Prefix
            backend:
              service:
                name: order-app
                port:
                  number: 8081
          - path: /actuator
            pathType: Prefix
            backend:
              service:
                name: user-app
                port:
                  number: 8080
          - path: /
            pathType: Prefix
            backend:
              service:
                name: devapp-web
                port:
                  number: 80
